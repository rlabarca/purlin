<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <!-- Header -->
      <div class="modal-header">
        <span id="modal-title" class="modal-title">Send feedback</span>
        <button class="btn-close" id="btn-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- Issue Type -->
        <div class="field-group">
          <label class="field-label" for="issue-type">What type of issue do you wish to report?</label>
          <div class="select-wrapper">
            <select id="issue-type" name="issueType" class="field-select" aria-required="true">
              <option value="">Select...</option>
              <option value="Bug">Bug</option>
              <option value="Usability">Usability</option>
              <option value="Feature Request">Feature Request</option>
            </select>
            <svg class="select-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="field-error" id="issue-type-error" role="alert" aria-live="polite"></span>
        </div>

        <!-- Details -->
        <div class="field-group">
          <label class="field-label" for="details">Please provide details: (optional)</label>
          <textarea
            id="details"
            name="details"
            class="field-textarea"
            placeholder="Add any details here ..."
            rows="3"
          ></textarea>
        </div>

        <!-- Attachments -->
        <div class="field-group">
          <label class="field-label">Attachments:</label>
          <div class="attachment-zone" id="attachment-zone">
            <span class="attachment-caption">Max file size: 5MB</span>
            <button type="button" class="btn-upload" id="btn-upload">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 1V9M7 1L4.5 3.5M7 1L9.5 3.5M1.5 11.5H12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Upload file
            </button>
            <span class="attachment-filename" id="attachment-filename"></span>
            <span class="field-error" id="attachment-error" role="alert" aria-live="polite"></span>
          </div>
          <input type="file" id="file-input" name="attachment" aria-label="Attach a file" style="display:none" />
        </div>

      </div><!-- /modal-body -->

      <!-- Footer -->
      <div class="modal-footer">
        <span class="footer-info">We'll include your name and current session details with this submission.</span>
        <div class="footer-actions">
          <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
          <button type="button" class="btn btn-submit" id="btn-submit">Submit</button>
        </div>
      </div>

      <!-- Status message -->
      <div class="modal-status" id="modal-status" role="status" aria-live="polite"></div>

    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
