<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purlin Dashboard</title>
<style>
/* ===== FONTS ===== */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  /* Status colors — shared across themes */
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.15);
  --amber: #f59e0b;
  --amber-dim: rgba(245, 158, 11, 0.15);
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --teal: #2dd4bf;
  --gray-badge: #64748b;
  /* Anchor type pill colors */
  --tp-anchor-color: #8b95a5;
  --tp-anchor-bg: rgba(139,149,165,.2);
  --tp-global-color: #a8b5c7;
  --tp-global-bg: rgba(168,181,199,.2);
}

/* ===== DARK THEME ===== */
[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-card: #1e293b;
  --bg-card-alt: #172033;
  --bg-hover: #263350;
  --bg-expanded: #162032;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-dim: #64748b;
  --border: #334155;
  --border-light: #1e293b;
  --logo-fill: #e2e8f0;
  --logo-guide: #94a3b8;
}

/* ===== LIGHT THEME ===== */
[data-theme="light"] {
  --bg-primary: #f1f5f9;
  --bg-card: #ffffff;
  --bg-card-alt: #f8fafc;
  --bg-hover: #e2e8f0;
  --bg-expanded: #f8fafc;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --text-dim: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --logo-fill: #1e293b;
  --logo-guide: #94a3b8;
}

/* ===== BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);font-size:14px;line-height:1.5;min-height:100vh;transition:background .2s,color .2s}
.dashboard{max-width:2400px;margin:0 auto;padding:0 clamp(16px, 2vw, 40px)}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;justify-content:space-between;height:56px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo svg{height:50px;width:auto;display:block}
.header-project{font-size:24px;font-weight:700}
.header-right{display:flex;align-items:center;gap:20px}

/* Staleness — informational only (data updates when sync_status runs, not on page refresh) */
.staleness{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)}
.staleness-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.staleness-dot.fresh{background:var(--green)}.staleness-dot.warning{background:var(--amber)}.staleness-dot.stale{background:var(--red)}
.staleness-text.warning{color:var(--amber)}.staleness-text.stale{color:var(--red)}


/* Theme toggle */
.theme-toggle{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-secondary);transition:background .2s,color .2s}
.theme-toggle:hover{background:var(--bg-hover);color:var(--text-primary)}
.theme-toggle svg{width:18px;height:18px}
[data-theme="dark"] .icon-sun{display:none}[data-theme="dark"] .icon-moon{display:block}
[data-theme="light"] .icon-sun{display:block}[data-theme="light"] .icon-moon{display:none}

/* ===== NO DATA STATE ===== */
.no-data{text-align:center;padding:80px 20px;color:var(--text-secondary)}
.no-data h2{font-size:18px;margin-bottom:8px;color:var(--text-primary)}
.no-data p{font-size:14px}
.no-data code{font-family:var(--font-mono);background:var(--bg-card);padding:2px 8px;border-radius:4px;font-size:13px}

/* ===== SUMMARY STRIP ===== */
.summary-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;transition:background .2s,border-color .2s}
.summary-card-number{font-size:34px;font-weight:700;line-height:1.1;margin-bottom:2px}
.summary-card-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em}
.summary-card-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.sc-total .summary-card-number{color:var(--text-primary)}
.sc-verified .summary-card-number{color:var(--green)}
.sc-passing .summary-card-number{color:var(--green);opacity:.7}
.sc-partial .summary-card-number{color:var(--amber)}
.sc-failing .summary-card-number{color:var(--red)}
.sc-integrity .summary-card-number{color:var(--green)}
.sc-integrity.int-mid .summary-card-number{color:var(--amber)}
.sc-integrity.int-lo .summary-card-number{color:var(--red)}
.sc-integrity.int-na .summary-card-number{color:var(--text-dim)}
.audit-time{font-size:12px;color:var(--text-dim);margin-left:4px}
.audit-time.stale{color:var(--amber)}

/* ===== TABLE ===== */
.table-container{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow-x:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text-secondary)}
th .sa{display:inline-block;margin-left:3px;opacity:.3;font-size:9px}
th .sa.active{opacity:1;color:var(--teal)}
td{padding:9px 16px;font-size:13px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.fr{cursor:pointer;transition:background .12s}
.fr:hover{background:var(--bg-hover)}
.fr:nth-child(even of .fr){background:var(--bg-card-alt)}
.fr:nth-child(even of .fr):hover{background:var(--bg-hover)}
.fr.expanded{background:var(--bg-hover)}

/* Feature name + type indicators */
.fn{display:flex;align-items:center;font-weight:500}
.chv{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;color:var(--text-dim);font-size:9px;transition:transform .15s;margin-right:4px;flex-shrink:0;transform-origin:center center}
.fr.expanded .chv{transform:rotate(90deg)}
.fnt{margin-right:8px}
.tp{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:1px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.tp-anchor{background:var(--tp-anchor-bg);color:var(--tp-anchor-color)}
.tp-global{background:var(--tp-global-bg);color:var(--tp-global-color)}
.ext-icon{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-left:4px;color:var(--teal);flex-shrink:0;opacity:.7}
.ext-icon svg{width:12px;height:12px}
.ext-icon:hover{opacity:1}
.ext-ref-block{margin-bottom:12px}
.ext-ref-table{width:auto;border-collapse:collapse}
.ext-ref-table td{padding:2px 12px 2px 0;font-size:13px;color:var(--text-secondary)}
.ext-ref-label{font-weight:600;color:var(--text-primary);white-space:nowrap;width:60px}
.ext-ref-warn{color:var(--amber)}
.ext-ref-table code{font-family:var(--font-mono);font-size:12px;background:var(--bg-card);padding:1px 4px;border-radius:3px}
.ext-ref-table a{color:var(--teal);text-decoration:none}
.ext-ref-table a:hover{text-decoration:underline}
.ext-stale{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-left:6px;color:var(--amber);border:1.5px solid var(--amber);background:transparent;vertical-align:middle;cursor:default}

/* Uncommitted work section */
.uw-section{margin:0 0 12px}
.uw-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;transition:background .2s}
.uw-header:hover{background:var(--bg-hover)}
.uw-chv{font-size:10px;color:var(--text-dim);transition:transform .2s}
.uw-header.expanded .uw-chv{transform:rotate(90deg)}
.uw-count{font-size:13px;color:var(--amber);font-weight:600}
.uw-label{font-size:12px;color:var(--text-secondary)}
.uw-files{display:none;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);columns:2 400px;column-gap:24px}
.uw-files .uw-f{display:block;padding:2px 0;break-inside:avoid}
.uw-header.expanded + .uw-files{display:block}

/* Section labels */
.section-label{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px;padding:0 4px;display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;font-weight:400;color:var(--text-tertiary)}

/* Coverage */
.cov{display:flex;align-items:center;gap:10px;white-space:nowrap}
.cov-t{font-family:var(--font-mono);font-size:12px;width:62px;flex-shrink:0;text-align:right}
.cov-bar{width:56px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cov-fill{height:100%;border-radius:3px}
.cov-verified{background:var(--green)}.cov-partial{background:var(--amber)}.cov-fail{background:var(--red)}.cov-none{background:var(--gray-badge)}

/* Status badges */
.col-status{text-align:center}
.sb{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.sb-verified{background:var(--green);color:#fff}
.sb-passing{background:transparent;color:var(--green);border:1.5px solid var(--green)}
.sb-partial{background:transparent;color:var(--amber);border:1.5px solid var(--amber)}
.sb-fail,.sb-failing{background:var(--red);color:#fff}
.sb-untested{background:var(--gray-badge);color:var(--amber);border:1.5px solid var(--gray-badge)}
.sb-none{background:var(--gray-badge);color:#fff;opacity:.45}

/* Integrity */
.int{font-family:var(--font-mono);font-size:12px}
.int-hi{color:var(--green)}.int-mid{color:var(--amber)}.int-lo{color:var(--red)}.int-na{color:var(--text-dim)}

/* Verified */
.ver{font-size:12px;color:var(--text-secondary)}
.ver-stale{color:var(--amber)}
.vhash{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-left:6px}

/* ===== CATEGORY SECTIONS ===== */
.cat-header{cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);border-top:2px solid var(--border)}
.cat-header:hover{background:var(--bg-hover)}
.cat-header td{padding:14px 16px;font-size:14px;font-weight:700;letter-spacing:.01em}
.cat-name{display:flex;align-items:center;gap:8px}
.cat-chv{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;color:var(--text-secondary);font-size:10px;transition:transform .15s;flex-shrink:0;transform-origin:center center}
.cat-header.expanded .cat-chv{transform:rotate(90deg)}
.cat-label{text-transform:uppercase;color:var(--text-primary);font-size:12px;letter-spacing:.08em}
.cat-count{font-size:11px;font-weight:400;color:var(--text-dim);margin-left:2px}
.cat-summary{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text-secondary)}
.cat-stat{display:flex;align-items:center;gap:3px;white-space:nowrap}
.cat-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cat-dot-v{background:var(--green)}.cat-dot-pa{background:var(--green);opacity:.6}.cat-dot-pt{background:var(--amber)}.cat-dot-f{background:var(--red)}.cat-dot-u{background:var(--amber);opacity:.5}
.cat-cov{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);width:62px;flex-shrink:0;text-align:right}
.cat-cov-bar{width:48px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px}
.cat-cov-fill{height:100%;border-radius:2px;display:block}
.cat-cov-fill.cov-verified{background:var(--green)}.cat-cov-fill.cov-partial{background:var(--amber)}.cat-cov-fill.cov-fail{background:var(--red)}
.cat-info{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
/* Per-category column headers */
.cat-colhead{border-left:3px solid var(--border)}
.cat-colhead th{background:var(--bg-card-alt)}
.cat-colhead th:first-child{padding-left:40px}
/* Feature rows nested under a category */
.cat-child td:first-child{padding-left:40px}
.cat-child{border-left:3px solid var(--border)}

/* ===== EXPANDED DETAIL ===== */
.dr>td{padding:0!important;border-bottom:1px solid var(--border)!important}
.dc{background:var(--bg-expanded);padding:14px 24px 18px;border-top:1px solid var(--border);overflow:hidden}
.dst{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:6px;margin-top:14px}
.dst:first-child{margin-top:0}

/* Description block */
.desc-block{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:14px;padding:10px 14px;background:var(--bg-card);border-radius:6px;border:1px solid var(--border);white-space:pre-line}

/* Rules sub-table */
.rt{width:100%;min-width:0;border-collapse:collapse;margin-bottom:4px;table-layout:fixed}
.rt th{padding:5px 8px;font-size:9px;cursor:default}
.rt td{padding:5px 8px;font-size:12px;border-bottom:1px solid var(--border-light);vertical-align:top;overflow-wrap:break-word;word-break:break-word}
.rt td.rid{font-family:var(--font-mono);font-size:11px;font-weight:600;white-space:nowrap;padding-right:24px}
.rdesc{color:var(--text-primary)}
.rlbl{font-size:10px;color:var(--text-dim);text-transform:uppercase}
.rlbl-scoped{color:var(--tp-anchor-color)}.rlbl-global{color:var(--tp-global-color)}
.rt td.rst{font-size:11px;font-weight:600;text-align:center;white-space:nowrap;padding:5px 6px}
.rst-pass{color:var(--green)}.rst-fail{color:var(--red)}.rst-np{color:var(--text-dim)}.rst-chk{color:var(--green)}.rst-chk-fail{color:var(--red)}.rst-def{color:var(--text-dim);font-style:italic}
.rprf{font-size:12px;color:var(--text-primary);overflow-wrap:break-word;word-break:break-word}
.rprf-loc{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:2px;overflow-wrap:break-word;word-break:break-all}
.rprf-sep{height:8px;border-top:1px solid var(--border-light);margin-top:8px;padding-top:0}
.atag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-right:6px;vertical-align:middle}
.atag-s{background:var(--green-dim);color:var(--green)}
.atag-w{background:var(--amber-dim);color:var(--amber)}
.atag-h{background:var(--red-dim);color:var(--red)}
.atag-st{background:var(--green);color:#fff}

/* Action banners */
.ab{padding:10px 14px;border-left:4px solid;border-radius:0 6px 6px 0;font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ab-icon{font-size:15px;flex-shrink:0;line-height:1}
.ab-text{flex:1}
.ab-cmd{font-family:var(--font-mono);font-size:11px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:3px}
.ab-partial{border-left-color:var(--amber);background:var(--amber-dim);color:var(--amber)}
.ab-failing{border-left-color:var(--red);background:var(--red-dim);color:var(--red)}
.ab-passing{border-left-color:var(--green);background:var(--green-dim);color:var(--green)}
.ab-untested{border-left-color:var(--gray-badge);background:rgba(100,116,139,.08);color:var(--text-dim)}

/* Rule row highlights */
.rule-np td{border-left:3px solid var(--amber)}
.rule-fail td{border-left:3px solid var(--red)}
.rule-np td.rst{font-weight:700}
.rule-fail td.rst{font-weight:700}

/* Audit summary */
.asummary{display:flex;align-items:center;gap:16px;margin-bottom:8px;padding:7px 12px;background:var(--bg-card);border-radius:6px;border:1px solid var(--border)}
.ascore{font-size:18px;font-weight:700;font-family:var(--font-mono)}
.ascore-hi{color:var(--green)}.ascore-mid{color:var(--amber)}.ascore-lo{color:var(--red)}
.abd{display:flex;gap:12px;font-size:11px;color:var(--text-secondary)}
.abd span{display:flex;align-items:center;gap:4px}
.adot{width:6px;height:6px;border-radius:50%;display:inline-block}
.adot-s{background:var(--green)}.adot-w{background:var(--amber)}.adot-h{background:var(--red)}

/* Findings */
.fgt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:10px;margin-bottom:5px}
.fgt-crit{color:var(--red)}.fgt-high{color:var(--amber)}.fgt-med{color:var(--blue)}.fgt-low{color:var(--text-dim)}
.fi{padding:7px 12px;border-left:3px solid;margin-bottom:5px;border-radius:0 4px 4px 0;font-size:12px}
.fi-crit{border-left-color:var(--red);background:var(--red-dim)}
.fi-high{border-left-color:var(--amber);background:var(--amber-dim)}
.fi-med{border-left-color:var(--blue);background:var(--blue-dim)}
.fi-low{border-left-color:var(--gray-badge);background:rgba(100,116,139,.08)}
.fid{font-family:var(--font-mono);font-size:11px;font-weight:600;margin-right:6px}
.ffix{color:var(--text-secondary);margin-top:3px;font-size:11px}
.ffix::before{content:"Fix: ";font-weight:600;color:var(--text-dim)}

/* ===== FOOTER ===== */
.footer{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.footer a{color:var(--teal);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ===== RESPONSIVE ===== */
table{min-width:680px}
@media (max-width:900px) {
  th,td{padding:8px 10px;font-size:12px}
  .cat-child td:first-child{padding-left:30px}
  .cat-colhead th:first-child{padding-left:30px}
  .cov-bar{width:40px}
  .cat-cov-bar{width:36px}
}
@media (max-width:700px) {
  .summary-strip{grid-template-columns:repeat(3,1fr)}
  .header{flex-wrap:wrap;height:auto;padding:12px 0;gap:8px}
  .header-right{flex-wrap:wrap;gap:10px}
}
@media (max-width:480px) {
  .summary-strip{grid-template-columns:repeat(2,1fr)}
  .dashboard{padding:0 8px}
}
</style>
</head>
<body>
<div class="dashboard" id="app"></div>
<script>
'use strict';

/* Load data with cache-busting to prevent stale reads on file:// */
(function(callback) {
  var s = document.createElement('script');
  s.src = '.purlin/report-data.js?t=' + Date.now();
  s.onload = callback;
  s.onerror = callback;
  document.head.appendChild(s);
})(function() {

  /* ===== DATA ===== */
  var D = (typeof PURLIN_DATA !== 'undefined') ? PURLIN_DATA : null;

  var app = document.getElementById('app');

  if (!D) {
    app.innerHTML = '<div class="no-data"><h2>No dashboard data</h2><p>Run <code>purlin:status</code> to generate data, then refresh this page.</p><p style="margin-top:8px">Make sure <code>"report": true</code> is set in <code>.purlin/config.json</code></p></div>';
    return;
  }

  /* ===== THEME ===== */
  var savedTheme = localStorage.getItem('purlin-theme');
  if (savedTheme === 'light' || savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', savedTheme);
  }

  function toggleTheme() {
    var cur = document.documentElement.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('purlin-theme', next);
  }

  /* ===== HELPERS ===== */
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function relTime(iso) {
    if (!iso) return null;
    var diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function staleness(iso) {
    if (!iso) return { cls: 'stale', text: '/status never run', warn: '' };
    var diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 3600) return { cls: 'fresh', text: '/status ' + relTime(iso), warn: '' };
    if (diff < 86400) return { cls: 'warning', text: '/status ' + relTime(iso), warn: ' \u2014 run purlin:status to refresh' };
    return { cls: 'stale', text: '/status ' + relTime(iso), warn: ' \u2014 run purlin:status to refresh' };
  }

  function covClass(status) {
    if (status === 'VERIFIED') return 'cov-verified';
    if (status === 'PASSING') return 'cov-verified';
    if (status === 'PARTIAL') return 'cov-partial';
    if (status === 'FAILING') return 'cov-fail';
    if (status === 'UNTESTED') return 'cov-partial';
    return 'cov-none';
  }

  function badgeClass(status) {
    if (status === 'VERIFIED') return 'sb sb-verified';
    if (status === 'PASSING') return 'sb sb-passing';
    if (status === 'PARTIAL') return 'sb sb-partial';
    if (status === 'FAILING') return 'sb sb-failing';
    if (status === 'UNTESTED') return 'sb sb-untested';
    return 'sb sb-none';
  }

  function badgeText(status) {
    if (status === 'VERIFIED') return 'Verified';
    if (status === 'PASSING') return 'Passing';
    if (status === 'PARTIAL') return 'Partial';
    if (status === 'FAILING') return 'Failing';
    if (status === 'UNTESTED') return 'Untested';
    return 'Untested';
  }

  function intClass(v) {
    if (v == null) return 'int int-na';
    if (v >= 80) return 'int int-hi';
    if (v >= 50) return 'int int-mid';
    return 'int int-lo';
  }

  function ruleStatusCls(s) {
    if (s === 'PASS') return 'rst rst-pass';
    if (s === 'FAIL') return 'rst rst-fail';
    if (s === 'DEFERRED') return 'rst rst-def';
    return 'rst rst-np';
  }

  function labelCls(l) {
    if (l === 'global') return 'rlbl rlbl-global';
    if (l === 'required') return 'rlbl rlbl-scoped';
    return 'rlbl';
  }

  function priorityOrder(p) {
    return {CRITICAL:0, HIGH:1, MEDIUM:2, LOW:3}[p] || 4;
  }

  function findingCls(p) {
    if (p === 'CRITICAL') return 'fi fi-crit';
    if (p === 'HIGH') return 'fi fi-high';
    if (p === 'MEDIUM') return 'fi fi-med';
    return 'fi fi-low';
  }

  function findingGroupCls(p) {
    if (p === 'CRITICAL') return 'fgt fgt-crit';
    if (p === 'HIGH') return 'fgt fgt-high';
    if (p === 'MEDIUM') return 'fgt fgt-med';
    return 'fgt fgt-low';
  }

  var _structRE = /grep|verify\s.*(?:exist|present|section|field|appear|contain)|file\s+exists|contains?\s+(?:section|field)/i;
  var _behavRE = /returns?|rejects?|blocks?|logs?|sends?|creates?|deletes?|updates?|computes?|detects?|emits?|produces?|triggers?|fails?|raises?|validates?|enforces?|prevents?/i;
  function isStructuralDesc(desc) {
    if (!desc) return false;
    if (_behavRE.test(desc)) return false;
    return _structRE.test(desc);
  }

  function auditTag(a, desc) {
    if (a) {
      var u = a.toUpperCase();
      if (u === 'STRONG') return '<span class="atag atag-s">Strong</span>';
      if (u === 'WEAK') return '<span class="atag atag-w">Weak</span>';
      if (u === 'HOLLOW') return '<span class="atag atag-h">Hollow</span>';
      if (u === 'MANUAL') return '<span class="atag atag-s">Manual</span>';
    }
    if (isStructuralDesc(desc)) return '<span class="atag atag-st">Structural</span>';
    return '';
  }

  function actionBanner(f) {
    if (f.status === 'VERIFIED') return '';

      return '<div class="ab ab-passing"><span class="ab-icon">&#10003;</span><span class="ab-text">All rules proved &mdash; run <span class="ab-cmd">purlin:verify</span> to issue a verification receipt</span></div>';
    }

      for (var i = 0; i < f.rules.length; i++) { if (f.rules[i].status === 'FAIL') failCount++; }
      return '<div class="ab ab-failing"><span class="ab-icon">&#10007;</span><span class="ab-text">' + failCount + ' test' + (failCount !== 1 ? 's' : '') + ' failing &mdash; fix code or tests to reach PASSING</span></div>';
    }
    if (f.status === 'PARTIAL') {
      var noProof = 0;
      for (var i = 0; i < f.rules.length; i++) { if (f.rules[i].status === 'NONE') noProof++; }
      return '<div class="ab ab-partial"><span class="ab-icon">&#9888;</span><span class="ab-text">' + noProof + ' rule' + (noProof !== 1 ? 's' : '') + ' need proofs &mdash; write tests to reach PASSING</span></div>';
    }
    if (f.status === 'UNTESTED') {
      return '<div class="ab ab-untested"><span class="ab-icon">&#9744;</span><span class="ab-text">No proofs yet &mdash; write tests to begin coverage</span></div>';
    }
    return '';
  }

  var hasGlobalAudit = false;

  function proofCell(p) {
    var h = '';
    if (hasGlobalAudit) h += auditTag(p.audit, p.description);
    if (p.id) h += '<span class="fid">' + esc(p.id) + '</span> ';
    if (p.description) {
      h += '<span>' + esc(p.description) + '</span>';
    }
    var loc = '';
    if (p.test_file) loc += p.test_file;
    if (p.test_name) loc += '::' + p.test_name;
    if (loc) h += '<div class="rprf-loc">' + esc(loc) + '</div>';
    return h;
  }

  var extIconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

  /* ===== SORTING ===== */
  var sortCol = 'status';
  var sortAsc = true;

  function statusOrder(s) { return {FAILING:0, PARTIAL:1, PASSING:2, VERIFIED:3, UNTESTED:4}[s] || 5; }

  function sortFeatures(features) {
    var arr = features.slice();
    arr.sort(function(a, b) {
      var va, vb;
      switch (sortCol) {
        case 'name': va = a.name.toLowerCase(); vb = b.name.toLowerCase(); break;
        case 'coverage': va = a.total ? a.proved / a.total : -1; vb = b.total ? b.proved / b.total : -1; break;
        case 'status': va = statusOrder(a.status); vb = statusOrder(b.status); break;
        case 'integrity':
          va = (a.audit && a.audit.integrity != null) ? a.audit.integrity : -1;
          vb = (b.audit && b.audit.integrity != null) ? b.audit.integrity : -1;
          break;
        case 'verified':
          va = (a.receipt && a.receipt.timestamp) ? new Date(a.receipt.timestamp).getTime() : 0;
          vb = (b.receipt && b.receipt.timestamp) ? new Date(b.receipt.timestamp).getTime() : 0;
          break;
        default: va = statusOrder(a.status); vb = statusOrder(b.status);
      }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return a.name.localeCompare(b.name);
    });
    return arr;
  }

  /* ===== RENDER ===== */
  /* Persist expanded rows and category state across reloads */
  var expandedSet = {};
  try { expandedSet = JSON.parse(localStorage.getItem('purlin-expanded') || '{}'); } catch(e) {}
  var categorySet = {};
  try { categorySet = JSON.parse(localStorage.getItem('purlin-categories') || '{}'); } catch(e) {}

  function groupByCategory(features) {
    var cats = {};
    var order = [];
    for (var i = 0; i < features.length; i++) {
      var cat = features[i].category || 'other';
      if (!cats[cat]) { cats[cat] = []; order.push(cat); }
      cats[cat].push(features[i]);
    }
    return { cats: cats, order: order };
  }

  function catSummary(features) {
    var s = { total: features.length, verified: 0, passing: 0, partial: 0, failing: 0, untested: 0, proved: 0, rules: 0 };
    for (var i = 0; i < features.length; i++) {
      var f = features[i];
      s.proved += f.proved;
      s.rules += f.total;
      if (f.status === 'VERIFIED') s.verified++;
      else if (f.status === 'PASSING') s.passing++;
      else if (f.status === 'PARTIAL') s.partial++;
      else if (f.status === 'FAILING') s.failing++;
      else s.untested++;
    }
    return s;
  }

  function catDisplayName(cat) {
    if (cat === '_anchors') return 'anchors';
    return cat;
  }

  function render() {
    var st = staleness(D.timestamp);
    var S = D.summary;
    var A = D.audit_summary;
    hasGlobalAudit = !!(A && A.integrity != null);
    var features = sortFeatures(D.features);

    var h = '';

    /* Header */
    h += '<header class="header"><div class="header-left">';
    h += '<div class="header-logo"><svg viewBox="140 100 720 520" xmlns="http://www.w3.org/2000/svg" height="50">';
    h += '<g stroke-width="2" fill="none" style="stroke:var(--logo-guide)"><line x1="500" y1="120" x2="500" y2="480" stroke-dasharray="8,8"/><line x1="500" y1="145" x2="170" y2="409"/><line x1="500" y1="145" x2="830" y2="409"/><line x1="400" y1="210" x2="400" y2="255"/><line x1="600" y1="210" x2="600" y2="255"/></g>';
    h += '<polyline points="400,280 500,390 600,280" fill="none" stroke-width="14" stroke-linejoin="miter" style="stroke:var(--logo-fill)"/>';
    h += '<path d="M500 160L190 408 190 440 810 440 810 408ZM500 200L262.5 390 737.5 390Z" fill-rule="evenodd" style="fill:var(--logo-fill)"/>';
    h += '<text x="500" y="550" text-anchor="middle" style="font-family:Montserrat,var(--font-sans);font-weight:200;font-size:76px;letter-spacing:.12em;fill:var(--logo-fill)">PURLIN</text>';
    h += '</svg></div>';
    h += '<span class="header-project">' + esc(D.project) + '</span>';
    h += '</div><div class="header-right">';
    h += '<div class="staleness"><span class="staleness-dot ' + st.cls + '"></span><span class="staleness-text' + (st.warn ? ' ' + st.cls : '') + '">' + esc(st.text + st.warn) + '</span>';
    h += '</div>';
    /* Last audit time */
    if (A && A.last_audit) {
      var auditRel = relTime(A.last_audit);
      var acls = A.stale ? 'audit-time stale' : 'audit-time';
      var atxt = '/audit ' + (auditRel || 'unknown');

    }
    h += '<button class="theme-toggle" id="theme-btn" title="Toggle dark/light mode">';
    h += '<svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    h += '<svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    h += '</button>';
    h += '</div></header>';

    /* Summary strip */
    h += '<div class="summary-strip">';
    h += '<div class="summary-card sc-total"><div class="summary-card-number">' + S.total_features + '</div><div class="summary-card-label">Specs</div>';
    if (D.anchors_summary.total) h += '<div class="summary-card-sub">+ ' + D.anchors_summary.total + ' anchors</div>';
    h += '</div>';
    h += '<div class="summary-card sc-verified"><div class="summary-card-number">' + S.verified + '</div><div class="summary-card-label">Verified</div></div>';
    h += '<div class="summary-card sc-passing"><div class="summary-card-number">' + (S.passing || 0) + '</div><div class="summary-card-label">Passing</div></div>';
    var incompleteCount = (S.partial || 0) + (S.untested || 0);
    h += '<div class="summary-card sc-partial"><div class="summary-card-number">' + incompleteCount + '</div><div class="summary-card-label">Incomplete</div>';
    if (S.partial && S.untested) h += '<div class="summary-card-sub">' + S.partial + ' partial, ' + S.untested + ' untested</div>';
    else if (S.untested) h += '<div class="summary-card-sub">' + S.untested + ' untested</div>';
    else if (S.partial) h += '<div class="summary-card-sub">' + S.partial + ' partial</div>';
    h += '</div>';
    h += '<div class="summary-card sc-failing"><div class="summary-card-number">' + S.failing + '</div><div class="summary-card-label">Failing</div></div>';
    /* Integrity card */
    if (A && A.integrity != null) {
      var icls = A.integrity >= 80 ? '' : A.integrity >= 50 ? ' int-mid' : ' int-lo';
      h += '<div class="summary-card sc-integrity' + icls + '"><div class="summary-card-number">' + A.integrity + '%</div><div class="summary-card-label">Proof Integrity</div>';
      h += '<div class="summary-card-sub">' + A.strong + 'S ' + A.weak + 'W ' + A.hollow + 'H</div>';
      h += '</div>';
    } else {
      h += '<div class="summary-card sc-integrity int-na"><div class="summary-card-number">&mdash;</div><div class="summary-card-label">Proof Integrity</div>';
      h += '<div class="summary-card-sub">run purlin:audit</div>';
      h += '</div>';
    }
    h += '</div>';

    /* Uncommitted work section */
    var uw = D.uncommitted || [];
    if (uw.length > 0) {
      h += '<div class="uw-section"><div class="uw-header" id="uw-toggle">';
      h += '<span class="uw-chv">&#9654;</span>';
      h += '<span class="uw-count">' + uw.length + '</span>';
      h += '<span class="uw-label">uncommitted file' + (uw.length !== 1 ? 's' : '') + '</span>';
      h += '</div>';
      h += '<div class="uw-files" id="uw-files">';
      for (var ui = 0; ui < uw.length; ui++) {
        h += '<span class="uw-f">' + esc(uw[ui]) + '</span>';
      }
      h += '</div></div>';
    }

    /* Shared table columns */
    var cols = [
      {key:'name', label:'Spec', w:''},
      {key:'coverage', label:'Coverage', w:'140px'},
      {key:'status', label:'Status', w:'100px'},
      {key:'integrity', label:'Integrity', w:'100px'},
      {key:'verified', label:'Verified', w:'180px'}
    ];

    function renderTableHead(nameLabel) {
      var th = '<thead><tr>';
      for (var ci = 0; ci < cols.length; ci++) {
        var c = cols[ci];
        var lbl = (ci === 0 && nameLabel) ? nameLabel : c.label;
        var arrow = (sortCol === c.key) ? (sortAsc ? '\u25B2' : '\u25BC') : '\u25BC';
        var acls = (sortCol === c.key) ? ' active' : '';
        th += '<th' + (c.w ? ' style="width:' + c.w + '"' : '') + ' data-col="' + c.key + '">' + lbl + ' <span class="sa' + acls + '">' + arrow + '</span></th>';
      }
      th += '</tr></thead>';
      return th;
    }

    function renderColHeaders(nameLabel) {
      var th = '<tr class="cat-colhead">';
      for (var ci = 0; ci < cols.length; ci++) {
        var c = cols[ci];
        var lbl = (ci === 0 && nameLabel) ? nameLabel : c.label;
        var arrow = (sortCol === c.key) ? (sortAsc ? '\u25B2' : '\u25BC') : '\u25BC';
        var acls = (sortCol === c.key) ? ' active' : '';
        th += '<th' + (c.w ? ' style="width:' + c.w + '"' : '') + ' data-col="' + c.key + '">' + lbl + ' <span class="sa' + acls + '">' + arrow + '</span></th>';
      }
      th += '</tr>';
      return th;
    }

    /* Split features into specs and anchors */
    var specFeatures = features.filter(function(f) { return f.type !== 'anchor'; });
    var anchorFeatures = features.filter(function(f) { return f.type === 'anchor'; });

    function renderCategoryBlock(grouped) {
      var bh = '';
      for (var gi = 0; gi < grouped.order.length; gi++) {
        var cat = grouped.order[gi];
        var catFeatures = grouped.cats[cat];
        var cs = catSummary(catFeatures);
        var catOpen = categorySet[cat] === true; /* collapsed by default */

        var catCovCls = cs.failing > 0 ? 'cov-fail' : (cs.partial > 0 || cs.untested > 0 || cs.proved < cs.rules) ? 'cov-partial' : 'cov-verified';

        bh += '<tr class="cat-header' + (catOpen ? ' expanded' : '') + '" data-cat="' + esc(cat) + '">';
        bh += '<td><div class="cat-name"><span class="cat-chv">&#9654;</span>';
        bh += '<span class="cat-label">' + esc(catDisplayName(cat)) + '</span>';
        bh += '<span class="cat-count">(' + cs.total + ')</span>';
        bh += '</div></td>';
        bh += '<td><div class="cov"><span class="cat-cov">' + cs.proved + '/' + cs.rules + '</span>';
        bh += '<div class="cat-cov-bar"><div class="cat-cov-fill ' + catCovCls + '" style="width:' + catPct + '%"></div></div></div></td>';
        bh += '<td colspan="3"><div class="cat-summary">';

        if (cs.passing) bh += '<span class="cat-stat"><span class="cat-dot cat-dot-pa"></span>' + cs.passing + ' passing</span>';
        if (cs.partial) bh += '<span class="cat-stat"><span class="cat-dot cat-dot-pt"></span>' + cs.partial + ' partial</span>';
        if (cs.failing) bh += '<span class="cat-stat"><span class="cat-dot cat-dot-f"></span>' + cs.failing + ' failing</span>';
        if (cs.untested) bh += '<span class="cat-stat"><span class="cat-dot cat-dot-u"></span>' + cs.untested + ' untested</span>';
        bh += '</div></td>';
        bh += '</tr>';

        /* Feature rows (only if category is open) */
        if (catOpen) {
          bh += renderColHeaders();
          for (var i = 0; i < catFeatures.length; i++) {
            var f = catFeatures[i];
            var isExpanded = expandedSet[f.name];
            var pct = f.total ? Math.round(f.proved / f.total * 100) : 0;
            var intVal = (f.audit && f.audit.integrity != null) ? f.audit.integrity : null;

            bh += '<tr class="fr cat-child' + (isExpanded ? ' expanded' : '') + '" data-name="' + esc(f.name) + '">';

            /* Name + type */
            bh += '<td><div class="fn"><span class="chv">&#9654;</span><span class="fnt">' + esc(f.name) + '</span>';
            if (f.type === 'anchor') {

                bh += '<span class="tp tp-global">global</span>';
              } else {
                bh += '<span class="tp tp-anchor">anchor</span>';
              }
            }
            if (f.source_url) {
              var extTitle = 'Source: ' + f.source_url;
              if (f.source_path) extTitle += '\nPath: ' + f.source_path;
              if (f.pinned) extTitle += '\nPinned: ' + (f.pinned.length > 10 ? f.pinned.substring(0, 7) : f.pinned);
              bh += '<span class="ext-icon" title="' + esc(extTitle) + '">' + extIconSvg + '</span>';

              }

            bh += '</div></td>';

            /* Coverage */
            bh += '<td><div class="cov"><span class="cov-t">' + f.proved + '/' + f.total + '</span>';
            bh += '<div class="cov-bar"><div class="cov-fill ' + covClass(f.status) + '" style="width:' + pct + '%"></div></div></div></td>';

            bh += '<td class="col-status"><span class="' + badgeClass(f.status) + '">' + badgeText(f.status) + '</span></td>';

            /* Integrity */
            bh += '<td class="' + intClass(intVal) + '">' + (intVal != null ? intVal + '%' : '&mdash;') + '</td>';

            if (f.receipt && f.receipt.timestamp) {

            if (isExpanded) {
              bh += renderDetail(f);
            }
          }
        }
      }
      return bh;
    }

    function renderSectionTable(sectionFeatures) {

        sh += '<col' + (cols[cgi].w ? ' style="width:' + cols[cgi].w + '"' : '') + '>';
      }
      sh += '</colgroup>';
      sh += '<tbody>';
      sh += renderCategoryBlock(groupByCategory(sectionFeatures));

    /* Specs section — non-anchor features only */
    h += '<div class="section-label">Specs</div>';
    h += renderSectionTable(specFeatures);

    /* Anchors section — anchor features only, separate from specs */
    if (anchorFeatures.length > 0) {
      h += '<div class="section-label">Anchors</div>';
      h += renderSectionTable(anchorFeatures);
    }

    /* Footer */
    h += '<footer class="footer"><span>Generated by Purlin' + (D.version ? ' v' + esc(D.version) : '') + '</span>';
    if (D.docs_url) {
      h += '<a href="' + esc(D.docs_url) + '" target="_blank" rel="noopener">Documentation</a>';
    }
    h += '</footer>';

    app.innerHTML = h;

    /* Attach event listeners */
    document.getElementById('theme-btn').addEventListener('click', function() { toggleTheme(); render(); });

    /* Live staleness: update "X ago" text every 30s */
    setInterval(function() {
      var dot = app.querySelector('.staleness-dot');
      var txt = app.querySelector('.staleness-text');
      if (dot && txt && D.timestamp) {
        var st = staleness(D.timestamp);
        dot.className = 'staleness-dot ' + st.cls;
        txt.className = 'staleness-text' + (st.warn ? ' ' + st.cls : '');
        txt.textContent = st.text + st.warn;
      }
      var auditEl = app.querySelector('.audit-time');
      if (auditEl && D.audit_summary && D.audit_summary.last_audit) {
        var ar = relTime(D.audit_summary.last_audit);
        var atxt = '/audit ' + (ar || 'unknown');
        if (D.audit_summary.stale) atxt += ' \u2014 run purlin:audit to refresh';
        auditEl.textContent = atxt;
      }
    }, 30000);

    var uwToggle = document.getElementById('uw-toggle');
    if (uwToggle) {
      uwToggle.addEventListener('click', function() {
        this.classList.toggle('expanded');
      });
    }

    var ths = app.querySelectorAll('th[data-col]');
    for (var ti = 0; ti < ths.length; ti++) {
      ths[ti].addEventListener('click', function(e) {
        var col = this.getAttribute('data-col');
        if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
        render();
      });
    }

    var cats = app.querySelectorAll('.cat-header');
    for (var ci2 = 0; ci2 < cats.length; ci2++) {
      cats[ci2].addEventListener('click', function() {
        var cat = this.getAttribute('data-cat');
        categorySet[cat] = !categorySet[cat];
        try { localStorage.setItem('purlin-categories', JSON.stringify(categorySet)); } catch(e) {}
        render();
      });
    }

    var frs = app.querySelectorAll('.fr');
    for (var fi = 0; fi < frs.length; fi++) {
      frs[fi].addEventListener('click', function() {
        var name = this.getAttribute('data-name');
        expandedSet[name] = !expandedSet[name];
        try { localStorage.setItem('purlin-expanded', JSON.stringify(expandedSet)); } catch(e) {}
        render();
      });
    }
  }

  function renderDetail(f) {
    var h = '<tr class="dr cat-child"><td colspan="5"><div class="dc">';

    /* Action banner */
    h += actionBanner(f);

    /* External reference info block */
    if (f.source_url) {
      h += '<div class="ext-ref-block"><div class="dst">External Reference</div>';
      h += '<table class="ext-ref-table"><tbody>';
      h += '<tr><td class="ext-ref-label">Source</td><td><a href="' + esc(f.source_url) + '" target="_blank" rel="noopener">' + esc(f.source_url) + '</a></td></tr>';
      if (f.source_path) {
        h += '<tr><td class="ext-ref-label">Path</td><td><code>' + esc(f.source_path) + '</code></td></tr>';
      }
      if (f.pinned) {
        var pd = f.pinned.length > 10 ? f.pinned.substring(0, 7) : f.pinned;
        h += '<tr><td class="ext-ref-label">Pinned</td><td><code>' + esc(pd) + '</code></td></tr>';
      } else {
        h += '<tr><td class="ext-ref-label">Pinned</td><td class="ext-ref-warn">Unpinned</td></tr>';
      }
      h += '</tbody></table></div>';
    }

    /* Description */
    if (f.description) {
      h += '<div class="desc-block">' + esc(f.description) + '</div>';
    }

    /* Rules table */
    h += '<div class="dst">Rules &amp; Proofs</div>';
    h += '<table class="rt"><thead><tr><th style="min-width:140px">Rule</th><th>Description</th><th style="width:80px">Anchor</th><th style="width:80px">Status</th><th style="width:40%">Proof</th></tr></thead><tbody>';

    for (var ri = 0; ri < f.rules.length; ri++) {
      var r = f.rules[ri];
      /* Support both old (r.proof) and new (r.proofs) data contract */
      var proofs = r.proofs || (r.proof ? [r.proof] : []);

      var rowCls = r.status === 'NONE' ? 'rule-np' : r.status === 'FAIL' ? 'rule-fail' : '';
      h += '<tr' + (rowCls ? ' class="' + rowCls + '"' : '') + '>';
      h += '<td class="rid">' + esc(r.id) + '</td>';
      h += '<td class="rdesc">' + esc(r.description) + '</td>';
      h += '<td class="' + labelCls(r.label) + '">' + (r.label === 'own' ? '' : esc(r.label)) + '</td>';
      h += '<td class="' + ruleStatusCls(r.status) + '">' + esc(r.status) + '</td>';

      if (proofs.length > 0) {
        var proofHtml = proofs.map(function(p) { return proofCell(p); }).join('<div class="rprf-sep"></div>');
        h += '<td class="rprf">' + proofHtml + '</td>';
      } else {
        h += '<td class="rprf">&mdash;</td>';
      }
      h += '</tr>';
    }
    h += '</tbody></table>';

    /* Audit findings */
    if (f.audit && f.audit.findings && f.audit.findings.length) {
      h += '<div class="dst">Audit Findings</div>';
      var a = f.audit;
      var scoreCls = a.integrity >= 80 ? 'ascore ascore-hi' : a.integrity >= 50 ? 'ascore ascore-mid' : 'ascore ascore-lo';
      h += '<div class="asummary"><span class="' + scoreCls + '">' + a.integrity + '%</span>';
      h += '<div class="abd">';
      h += '<span><span class="adot adot-s"></span> ' + a.strong + ' strong</span>';
      h += '<span><span class="adot adot-w"></span> ' + a.weak + ' weak</span>';
      h += '<span><span class="adot adot-h"></span> ' + a.hollow + ' hollow</span>';
      h += '</div></div>';

      /* Group by priority */
      var grouped = {};
      for (var fi2 = 0; fi2 < a.findings.length; fi2++) {
        var fd = a.findings[fi2];
        var p = fd.priority || 'LOW';
        if (!grouped[p]) grouped[p] = [];
        grouped[p].push(fd);
      }
      var prios = ['CRITICAL','HIGH','MEDIUM','LOW'];
      for (var pi = 0; pi < prios.length; pi++) {
        var pr = prios[pi];
        if (!grouped[pr]) continue;
        h += '<div class="' + findingGroupCls(pr) + '">' + pr + '</div>';
        for (var gi = 0; gi < grouped[pr].length; gi++) {
          var fd2 = grouped[pr][gi];
          h += '<div class="' + findingCls(pr) + '">';
          h += '<span class="fid">' + esc(fd2.proof_id) + '</span>';
          if (fd2.level) h += auditTag(fd2.level);
          h += '<span>' + esc(fd2.criterion) + '</span>';
          if (fd2.fix) h += '<div class="ffix">' + esc(fd2.fix) + '</div>';
          h += '</div>';
        }
      }
    } else if (f.audit && f.audit.integrity != null) {
      h += '<div class="dst">Audit</div>';
      var a2 = f.audit;
      var scoreCls2 = a2.integrity >= 80 ? 'ascore ascore-hi' : a2.integrity >= 50 ? 'ascore ascore-mid' : 'ascore ascore-lo';
      h += '<div class="asummary"><span class="' + scoreCls2 + '">' + a2.integrity + '%</span>';
      h += '<div class="abd">';
      h += '<span><span class="adot adot-s"></span> ' + a2.strong + ' strong</span>';
      h += '<span><span class="adot adot-w"></span> ' + a2.weak + ' weak</span>';
      h += '<span><span class="adot adot-h"></span> ' + a2.hollow + ' hollow</span>';
      h += '</div></div>';
    }

    h += '</div></td></tr>';
    return h;
  }

  render();
});
</script>
</body>
</html>
